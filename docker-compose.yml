services:
  postgres:
    image: postgres:17
    container_name: bharatmock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LOCAL_DB_USER:-bharatmock}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD:-bharatmock_local_dev}
      POSTGRES_DB: ${LOCAL_DB_NAME:-bharatmock}
    ports:
      - "${LOCAL_DB_PORT:-5433}:5432"
    volumes:
      - bharatmock_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_DB_USER:-bharatmock}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bharatmock_postgres_data:
