# Resource budget note (KVM2 = 2 vCPU / 8GB total, shared with the frontend,
# Redis, and the k3s control plane + Traefik + metrics-server):
#   requests: 200m CPU / 300Mi mem  x up to 4 replicas (HPA, see backend-hpa.yaml)
#   limits:   600m CPU / 1.75Gi mem
# The memory LIMIT is deliberately large (1.75Gi, not the API's ~90Mi idle
# footprint) purely for PDF export: src/utils/pdfBrowser.js renders exams with
# headless Chromium, keeps one shared Chromium instance resident per pod, and
# merges up to 3 rendered documents (cover + content + back). The old 900Mi
# ceiling OOM-killed the pod mid-render (Node heap capped at 768MB via
# NODE_OPTIONS + a Chromium child that spikes several hundred MB > 900Mi),
# which surfaced to the browser as "PDF generation failed: Failed to fetch"
# (the OOM severs the in-flight HTTP connection). 1.75Gi gives Node + Chromium
# room even on a large exam. Only the LIMIT changed — requests stay at 300Mi
# (idle baseline is ~90Mi), so the scheduler doesn't over-reserve; the ceiling
# is burstable and only reached during an actual export.
# Memory usage is safe on the box: requests reserve ~600Mi (2 backend replicas),
# and even both replicas peaking is ~3.5Gi against ~6.3GB free.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: bharatmock
  labels:
    app: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001 # matches the fixed UID the Dockerfile's `app` user is created with
      containers:
        - name: backend
          image: ghcr.io/orincore/bharat-mock-backend:latest # replaced by CI on every deploy
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: "200m"
              memory: "300Mi"
            limits:
              cpu: "600m"
              memory: "1792Mi" # 1.75Gi — headroom for Chromium PDF export (see top note)
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
