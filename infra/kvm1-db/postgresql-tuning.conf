# Tuning for KVM1: 1 vCPU / 4GB RAM / NVMe SSD (Hostinger KVM 1 plan).
# Included via conf.d/ (see provision-kvm1.sh) rather than editing
# postgresql.conf directly, so this stays a clean diff-able file.
#
# max_connections is intentionally low — PgBouncer (pgbouncer.ini) is what
# absorbs concurrency from however many backend replicas KVM2's HPA scales up
# to; Postgres itself only ever sees a small, stable pool of real connections
# from PgBouncer, not one-per-app-replica-per-pool-slot. On a single core,
# more real Postgres connections doesn't add throughput, it adds
# context-switch overhead — this is the actual bottleneck to watch at
# "lakhs of users" scale, not replica count on KVM2.
max_connections = 40

# Memory (25% / 75% split is the standard starting point for a dedicated DB box)
shared_buffers = 1GB
effective_cache_size = 3GB
maintenance_work_mem = 256MB
work_mem = 8MB              # conservative — 1 core limits real concurrent sort/hash ops anyway

# WAL / checkpoints
wal_buffers = 16MB
checkpoint_completion_target = 0.9
min_wal_size = 1GB
max_wal_size = 4GB

# NVMe SSD — default random_page_cost (4) assumes spinning disks
random_page_cost = 1.1
effective_io_concurrency = 200

# Visibility into what's actually slow, without editing app code —
# pairs with src/middleware/performance.js's own slow-request logging
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
log_min_duration_statement = 500   # ms; logs any query slower than this
