[databases]
bharatmock = host=127.0.0.1 port=5432 dbname=bharatmock

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling: a client (one backend replica's pg.Pool connection)
; only holds a real Postgres connection for the duration of one transaction,
; then releases it back to the pool — this is what lets many app-side
; connections (up to max_client_conn) share a much smaller number of real
; Postgres backends (default_pool_size), which is the whole point of running
; this in front of a 1 vCPU / max_connections=40 Postgres.
pool_mode = transaction

; Headroom under postgresql-tuning.conf's max_connections=40: leaves room for
; psql/admin/monitoring connections outside the pool.
default_pool_size = 20
max_client_conn = 200
reserve_pool_size = 5

; A stuck client shouldn't hold a real Postgres connection forever
server_idle_timeout = 60
query_wait_timeout = 30

admin_users = bharatmock
stats_period = 60
